<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natanem Couture  | High Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Cinzel for Logo, Playfair for Headings, Montserrat for Body -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@200;300;400;500&family=Noto+Sans+Ethiopic:wght@200;300;400;500&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        champagne: '#E5D3B3',
                        burgundy: '#570012',
                        offWhite: '#FAFAFA',
                        offBlack: '#111111',
                    },
                    fontFamily: {
                        logo: ['Cinzel', 'serif'],
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                        amharic: ['Noto Sans Ethiopic', 'sans-serif']
                    },
                    letterSpacing: {
                        'mega': '0.35em',
                        'luxury': '0.2em',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAFAFA;
            color: #111111;
            overflow-x: hidden;
            /* Lock scroll initially for preloader */
            overflow-y: hidden;
        }

        /* --- PRELOADER STYLES --- */
        #preloader {
            position: fixed;
            inset: 0;
            background-color: #111111;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }

        .ripple-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ripple {
            position: absolute;
            border: 1px solid #D4AF37;
            opacity: 0;
            border-radius: 50%;
            animation: ripple-effect 3s cubic-bezier(0.23, 1, 0.32, 1) infinite;
        }

        .ripple:nth-child(2) {
            animation-delay: 1s;
        }

        .ripple:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ripple-effect {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }

            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        .loader-logo {
            font-family: 'Cinzel', serif;
            color: #E5D3B3;
            letter-spacing: 0.5em;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-top: 50px;
            opacity: 0;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- END PRELOADER STYLES --- */

        .brand-logo {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #C5A059 0%, #E6D8BE 50%, #C5A059 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shimmer 8s linear infinite;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        header.scrolled {
            background-color: rgba(255, 255, 255, 0.98);
            padding-top: 1.25rem;
            padding-bottom: 1.25rem;
        }

        .nav-item {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 50%;
            background-color: currentColor;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(-50%);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 2s ease-in-out, transform 10s linear;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .hero-overlay {
            background: rgba(0, 0, 0, 0.3);
            position: absolute;
            inset: 0;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Language Toggle */
        .hidden-lang {
            display: none;
        }

        .visible-lang {
            display: block;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #C5A059;
        }

        .parallax-section {
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>

<body class="font-sans antialiased">

    <!-- Preloader -->
 

    <!-- Header -->
    <header id="main-header">
    
          <text>dfsf</text>
     
    </header>

   
 <!-- Hero -->
 
 

 
</body>

</html>
